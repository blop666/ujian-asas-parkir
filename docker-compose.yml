services:
  app:
    build: .
    ports:
      - "8000-8002:80"
    volumes:
      - .:/web/pino
      - app_session:/web/pino/storage/framework/sessions
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=parkir
      - DB_USERNAME=root
      - DB_PASSWORD=123
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=file
    depends_on:
      - db
  
  db:
    image: mysql:8.0
    container_name: parking-db
    environment:
      - MYSQL_DATABASE=parkir
      - MYSQL_ROOT_PASSWORD=123
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
  app_session: